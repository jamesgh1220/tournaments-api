version: '3.9'

services:

  # ── Aplicación NestJS ─────────────────────────────────────
  app:
    build: .
    container_name: tournaments_api
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      DB_HOST:     db          # nombre del servicio, no localhost
      DB_PORT:     "5432"
      DB_USER:     ${DB_USER}
      DB_PASS:     ${DB_PASS}
      DB_NAME:     ${DB_NAME}
      JWT_SECRET:  ${JWT_SECRET}
    volumes:
      - ./src:/app/src   # hot reload: sincroniza src/
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend

  # ── PostgreSQL ────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: nestjs_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB:       ${DB_NAME}
    ports:
      - "5432:5432"       # opcional: acceso desde host (DBeaver, etc.)
    volumes:
      - tournaments_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout:  5s
      retries:  5
    networks:
      - backend

# ── Volúmenes y redes ─────────────────────────────────────
volumes:
  tournaments_data:   # persiste los datos de PostgreSQL

networks:
  backend:
    driver: bridge